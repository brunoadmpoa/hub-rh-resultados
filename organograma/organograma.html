<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Organograma — +A Educação LTDA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root{
      --c-n0:#0F172A;--c-n1:#1D4ED8;--c-n2:#60A5FA;--c-n3:#0F766E;
      --c-n4:#34D399;--c-n5:#6366F1;
      --c-leaf:#E5E7EB;--c-bg:#F8FAFC;--c-surface:#FFFFFF;
      --c-border:#E2E8F0;--c-text:#0F172A;--c-muted:#64748B;--c-accent:#1D4ED8;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',Calibri,Arial,sans-serif;background:var(--c-bg);color:var(--c-text);display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* ── Header ── */
    #header{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;flex-wrap:wrap}
    #header-brand{display:flex;align-items:center;gap:10px}
    #header-title{font-size:15px;font-weight:700;color:var(--c-n1);letter-spacing:.4px}
    #header-view-label{font-size:12px;font-weight:500;color:var(--c-muted);margin-top:2px}
    #header-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--c-muted);flex-wrap:wrap}
    #header-count{font-weight:600;color:var(--c-text)}

    /* ── Controls bar ── */
    #controls-bar{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:8px 16px;display:flex;align-items:flex-end;gap:0;flex-shrink:0;flex-wrap:wrap}
    .ctrl-section{display:flex;flex-direction:column;gap:4px;padding-right:12px}
    .ctrl-label{font-size:10px;font-weight:600;color:var(--c-muted);letter-spacing:.6px;text-transform:uppercase;line-height:1}
    .ctrl-sep{width:1px;height:40px;background:var(--c-border);flex-shrink:0;margin:0 12px 0 0;align-self:center}
    .ctrl-row{display:flex;gap:6px;align-items:center}
    #search-counter{font-size:11px;color:var(--c-muted);white-space:nowrap;min-width:58px;text-align:center}
    #btn-prev-result,#btn-next-result{padding:5px 9px;font-size:15px;line-height:1}
    #btn-prev-result:disabled,#btn-next-result:disabled{opacity:.35;cursor:default}
    #view-select{padding:5px 10px;border:1px solid var(--c-border);border-radius:8px;font-size:12px;font-family:inherit;background:var(--c-surface);color:var(--c-text);cursor:pointer;outline:none;transition:border-color .15s;min-width:160px}
    #view-select:focus{border-color:var(--c-accent)}
    #mgr-input{padding:5px 10px;border:1px solid var(--c-border);border-radius:8px;font-size:12px;font-family:inherit;width:170px;outline:none;transition:border-color .15s}
    #mgr-input:focus{border-color:var(--c-accent)}
    #q{padding:5px 10px;border:1px solid var(--c-border);border-radius:8px;font-size:12px;font-family:inherit;width:180px;outline:none;transition:border-color .15s}
    #q:focus{border-color:var(--c-accent)}
    .tbtn{padding:5px 12px;border:1px solid var(--c-border);border-radius:8px;background:var(--c-surface);font-size:12px;font-family:inherit;font-weight:500;color:var(--c-text);cursor:pointer;white-space:nowrap;transition:background .15s}
    .tbtn:hover{background:#F1F5F9}
    .tbtn-primary{background:var(--c-accent);border-color:var(--c-accent);color:#fff}
    .tbtn-primary:hover{background:#1A44C2}
    #depth-btns{display:flex;gap:4px}
    .dbtn{padding:4px 10px;border:1px solid var(--c-border);border-radius:20px;background:var(--c-surface);font-size:11px;font-family:inherit;font-weight:500;color:var(--c-text);cursor:pointer;white-space:nowrap;transition:background .12s,border-color .12s}
    .dbtn:hover{background:#F1F5F9}
    .dbtn.active{background:var(--c-accent);border-color:var(--c-accent);color:#fff}

    /* ── Stats bar ── */
    #stats-bar{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:7px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
    .scard{display:flex;align-items:center;gap:8px;padding:5px 14px;border-radius:8px;border:1px solid var(--c-border);background:#F8FAFC}
    .scard-val{font-size:18px;font-weight:700;color:var(--c-n1)}
    .scard-lbl{font-size:11px;color:var(--c-muted);font-weight:500}
    #legend-inline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--c-muted);white-space:nowrap}
    .leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

    /* ── Main ── */
    #main{flex:1;display:flex;overflow:hidden}
    #chart-wrap{flex:1;position:relative;overflow:hidden;background:var(--c-bg)}
    #chart-container{width:100%;height:100%}
    #chart-container svg{display:block}

    .org-link{fill:none;stroke:#CBD5E1;stroke-width:1.5px}
    .toggle-btn{cursor:pointer}
    .toggle-btn rect{fill:#fff;stroke:#CBD5E1;stroke-width:1px}
    .toggle-btn text{pointer-events:none;user-select:none}

    #zoomControls{position:absolute;top:12px;right:12px;z-index:50;display:flex;flex-direction:column;gap:5px;background:var(--c-surface);padding:7px;border-radius:10px;border:1px solid var(--c-border);box-shadow:0 2px 8px rgba(0,0,0,.10)}
    .zoom-btn{width:36px;height:32px;border:1px solid var(--c-border);border-radius:7px;background:var(--c-surface);cursor:pointer;font-size:17px;font-weight:700;color:var(--c-text);display:flex;align-items:center;justify-content:center;transition:background .12s}
    .zoom-btn:hover{background:#F1F5F9}

    /* ── Info panel ── */
    #info-panel{width:0;overflow:hidden;transition:width .22s ease;background:var(--c-surface);border-left:1px solid var(--c-border);flex-shrink:0;position:relative}
    #info-panel.open{width:290px}
    #info-inner{width:290px;padding:16px;overflow-y:auto;height:100%}
    #info-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border:none;background:transparent;cursor:pointer;font-size:16px;color:var(--c-muted);border-radius:6px;display:flex;align-items:center;justify-content:center}
    #info-close:hover{background:#F1F5F9}
    #info-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin-bottom:10px}
    #info-nome{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px}
    #info-cargo{font-size:12px;color:var(--c-muted);margin-bottom:12px}
    .info-divider{border:none;border-top:1px solid var(--c-border);margin:10px 0}
    .info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:12px}
    .info-row-label{color:var(--c-muted);font-weight:500;white-space:nowrap}
    .info-row-val{font-weight:600;text-align:right;word-break:break-word}
    .info-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}

    /* ── Footer ── */
    #footer{background:var(--c-surface);border-top:1px solid var(--c-border);padding:5px 16px;font-size:11px;color:var(--c-muted);text-align:center;flex-shrink:0}

    @media print{
      @page{size:landscape;margin:0.5cm}
      #controls-bar,#stats-bar,#zoomControls,#info-panel,#footer{display:none!important}
      html,body{overflow:visible!important;height:auto!important;display:block!important}
      #main,#chart-wrap,#chart-container{overflow:visible!important;height:auto!important;display:block!important;flex:none!important}
      #chart-container svg{display:block!important;width:100%!important;height:auto!important}
    }
  </style>

<script>
(function(){
  var RAW = JSON.parse(document.getElementById('orgdata').textContent);

  var C = {
    n0:{bg:'#0F172A',tx:'#fff'},
    n1:{bg:'#1D4ED8',tx:'#fff'},
    n2:{bg:'#60A5FA',tx:'#0F172A'},
    n3:{bg:'#0F766E',tx:'#fff'},
    n4:{bg:'#34D399',tx:'#0F172A'},
    n5:{bg:'#6366F1',tx:'#fff'},
    leaf:{bg:'#E5E7EB',tx:'#0F172A'},
    unknown:{bg:'#64748B',tx:'#fff'}
  };
  var GRAD = {
    n0:'linear-gradient(135deg,#FFFFFF 0%,#E2E8F0 100%)',
    n1:'linear-gradient(135deg,#FFFFFF 0%,#DBEAFE 100%)',
    n2:'linear-gradient(135deg,#FFFFFF 0%,#EFF6FF 100%)',
    n3:'linear-gradient(135deg,#FFFFFF 0%,#CCFBF1 100%)',
    n4:'linear-gradient(135deg,#FFFFFF 0%,#ECFDF5 100%)',
    n5:'linear-gradient(135deg,#FFFFFF 0%,#EEF2FF 100%)',
    leaf:'linear-gradient(135deg,#FFFFFF 0%,#F3F4F6 100%)',
    unknown:'linear-gradient(135deg,#FFFFFF 0%,#F1F5F9 100%)'
  };
  var NL = {n0:'CEO',n1:'Diretoria',n2:'Gerência Executiva',n3:'Gerência',n4:'Coordenação',n5:'Supervisão',leaf:'Colaboradores'};

  var ALL_RAW;
  var trueRootId;
  var root;
  var _searchResults = [];
  var _searchIndex   = -1;
  var _highlightId   = null;

  // Normaliza hierarquia: usa matrícula (antes do |) como chave estável.
  // Salva trueRootId — nó raiz que não tem parentId mas é pai de outros.
  (function normalizeHierarchy() {
    var matToId = Object.create(null);
    RAW.forEach(function(d){
      var mat = d.id.split('|')[0];
      if (!matToId[mat]) matToId[mat] = d.id;
    });
    RAW.forEach(function(d){
      if (!d.parentId) return;
      var pMat = d.parentId.split('|')[0];
      d.parentId = matToId[pMat] || null;
    });
    var usedAsParent = Object.create(null);
    RAW.forEach(function(d){ if (d.parentId) usedAsParent[d.parentId] = true; });
    var nullNodes = RAW.filter(function(d){ return !d.parentId; });
    var trueRootNode = nullNodes.find(function(d){ return usedAsParent[d.id]; }) || nullNodes[0];
    if (!trueRootNode) return;
    trueRootId = trueRootNode.id;
    RAW.forEach(function(d){
      if (!d.parentId && d.id !== trueRootNode.id) d.parentId = trueRootNode.id;
    });
  })();

  ALL_RAW = RAW.slice();
  document.getElementById('stat-total-hdr').textContent = ALL_RAW.length;

  // ── Dropdowns ──
  function buildDropdowns() {
    var viewSel = document.getElementById('view-select');
    ALL_RAW.filter(function(d){ return d.nivel_cat === 'n1'; })
      .sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); })
      .forEach(function(d){
        var opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = 'Diretoria — ' + d.nome;
        viewSel.appendChild(opt);
      });
    var dl = document.getElementById('mgr-list');
    ALL_RAW.filter(function(d){ return d.isManager; })
      .sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); })
      .forEach(function(d){
        var opt = document.createElement('option');
        opt.value = d.nome;
        opt.setAttribute('data-id', d.id);
        dl.appendChild(opt);
      });
  }

  // ── BFS subtree extraction ──
  function extractSubtree(rootId) {
    var childrenOf = Object.create(null);
    ALL_RAW.forEach(function(d){
      if (d.parentId){
        if (!childrenOf[d.parentId]) childrenOf[d.parentId] = [];
        childrenOf[d.parentId].push(d.id);
      }
    });
    var included = Object.create(null);
    var queue = [rootId];
    included[rootId] = true;
    while (queue.length){
      var cur = queue.shift();
      (childrenOf[cur]||[]).forEach(function(cid){
        if (!included[cid]){ included[cid]=true; queue.push(cid); }
      });
    }
    return ALL_RAW.filter(function(d){ return included[d.id]; });
  }

  // ── Stats ──
  function updateStats(data) {
    var mgrs = data.filter(function(d){ return d.isManager; });
    var dirs = data.filter(function(d){ return d.nivel_cat === 'n1'; });
    document.getElementById('sc-total').textContent = data.length;
    document.getElementById('sc-dirs').textContent = dirs.length;
    document.getElementById('sc-gestores').textContent = mgrs.length;
    /* stat-total-hdr é fixo (total geral) — não atualiza aqui */
  }

  // ── Set view ──
  function setView(rootId) {
    clearSearch();
    document.getElementById('q').value = '';
    var data = rootId ? extractSubtree(rootId) : ALL_RAW.slice();
    var effRoot = rootId || trueRootId;

    var stratData = data.map(function(d){
      if (d.id === effRoot) return Object.assign({}, d, {parentId: null});
      return d;
    });

    try {
      root = d3.stratify()
        .id(function(d){ return d.id; })
        .parentId(function(d){ return d.parentId || null; })
        (stratData);
    } catch(e) {
      document.getElementById('chart-container').innerHTML =
        '<p style="color:#b91c1c;padding:24px;font-family:sans-serif">Erro ao construir hierarquia: ' + e.message + '</p>';
      return;
    }

    root.descendants().forEach(function(d){
      if (d.depth > 0 && d.children){ d._children = d.children; d.children = null; }
    });

    _fitted = false;
    update();
    setTimeout(fit, 80);
    updateStats(data);

    var node = ALL_RAW.find(function(d){ return d.id === effRoot; });
    var label = (node && node.nome) ? node.nome : '+A Educação LTDA';
    if (effRoot === trueRootId) label = '+A Educação LTDA';
    else if (node && node.nivel_cat === 'n1') label = 'Diretoria — ' + node.nome;
    document.getElementById('header-view-label').textContent = label;
  }

  // ── D3 tree ──
  var NW = 230, NH = 96;
  var treeLayout = d3.tree().nodeSize([NW + 50, NH + 80]);

  var ctr = document.getElementById('chart-container');
  var svg = d3.select(ctr).append('svg').attr('width','100%').attr('height','100%');

  var _z = 1;
  var zoomBeh = d3.zoom().scaleExtent([0.10, 2.5]).on('zoom', function(e){
    zg.attr('transform', e.transform);
    _z = e.transform.k;
  });
  svg.call(zoomBeh).on('dblclick.zoom', null);

  var zg = svg.append('g');
  var lg = zg.append('g');
  var ng = zg.append('g');
  var _fitted = false;
  var _lastOpenId = null;

  function elbow(d) {
    var sx = d.source.x, sy = d.source.y + NH;
    var tx = d.target.x, ty = d.target.y;
    var my = sy + (ty - sy) * 0.5;
    return 'M' + sx + ',' + sy + 'V' + my + 'H' + tx + 'V' + ty;
  }

  function buildCard(fo, data) {
    var ns = 'http://www.w3.org/1999/xhtml';
    var cat = data.nivel_cat || 'unknown';
    var c = C[cat] || C.unknown;
    var grad = GRAD[cat] || GRAD.unknown;

    var wrap = document.createElementNS(ns, 'div');
    wrap.setAttribute('style',
      'font-family:Inter,Calibri,Arial,sans-serif;width:' + NW + 'px;height:' + NH + 'px;' +
      'background:' + grad + ';border-left:4px solid ' + c.bg + ';border-radius:8px;' +
      'box-shadow:0 2px 8px rgba(0,0,0,.10);' +
      'display:flex;flex-direction:column;justify-content:center;' +
      'padding:8px 12px;box-sizing:border-box;cursor:pointer;overflow:hidden');

    var nm = document.createElementNS(ns, 'div');
    nm.setAttribute('style',
      'font-weight:700;font-size:12px;line-height:1.2;color:#0F172A;' +
      'overflow:hidden;text-overflow:ellipsis;white-space:nowrap');
    nm.textContent = data.nome || '';
    nm.setAttribute('title', data.nome || '');
    wrap.appendChild(nm);

    if (data.cargo) {
      var cg = document.createElementNS(ns, 'div');
      cg.setAttribute('style',
        'font-size:10px;color:#64748B;margin-top:3px;overflow:hidden;' +
        'display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3');
      cg.textContent = data.cargo;
      wrap.appendChild(cg);
    }
    if (data.isManager) {
      var spanVal = data.liderados_diretos + data.liderados_indiretos;
      var dr = document.createElementNS(ns, 'div');
      dr.setAttribute('style', 'font-size:10px;color:#94A3B8;margin-top:4px');
      dr.textContent = 'Diretos: ' + data.liderados_diretos + ' | Indiretos: ' + data.liderados_indiretos + ' | Span: ' + spanVal;
      wrap.appendChild(dr);
    }

    fo.appendChild(wrap);
  }

  function update() {
    treeLayout(root);
    lg.selectAll('*').remove();
    ng.selectAll('*').remove();

    lg.selectAll('path').data(root.links()).enter()
      .append('path').attr('class', 'org-link').attr('d', elbow);

    var nodes = ng.selectAll('g.nd').data(root.descendants()).enter()
      .append('g').attr('class', 'nd')
      .attr('transform', function(d){ return 'translate(' + d.x + ',' + d.y + ')'; });

    nodes.each(function(d){
      var self = this;

      var fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
      fo.setAttribute('width', NW);
      fo.setAttribute('height', NH);
      fo.setAttribute('x', -NW / 2);
      fo.setAttribute('y', 0);
      buildCard(fo, d.data);
      fo.addEventListener('click', function(){
        var panel = document.getElementById('info-panel');
        if (_lastOpenId === d.data.id && panel.classList.contains('open')) {
          panel.classList.remove('open');
          _lastOpenId = null;
          applyHighlight(null);
        } else {
          openPanel(d.data);
          _lastOpenId = d.data.id;
          applyHighlight(d.data.id);
        }
      });
      self.appendChild(fo);

      if (d.children || d._children) {
        var g2 = d3.select(self).append('g').attr('class', 'toggle-btn')
          .attr('transform', 'translate(0,' + (NH + 2) + ')')
          .on('click', function(e){ e.stopPropagation(); toggle(d); update(); });
        g2.append('rect').attr('x', -10).attr('y', 0).attr('width', 20).attr('height', 16).attr('rx', 3);
        g2.append('text').attr('x', 0).attr('y', 12)
          .attr('text-anchor', 'middle')
          .attr('font-family', 'Inter,sans-serif')
          .attr('font-size', 12).attr('font-weight', 700).attr('fill', '#64748B')
          .text(d.children ? '−' : '+');
      }
    });

    var desc = root.descendants();
    if (desc.length > 0) {
      var xs = desc.map(function(d){ return d.x; });
      var ys = desc.map(function(d){ return d.y; });
      var pad = 300;
      zoomBeh.translateExtent([
        [Math.min.apply(null,xs) - NW/2 - pad, Math.min.apply(null,ys) - pad],
        [Math.max.apply(null,xs) + NW/2 + pad, Math.max.apply(null,ys) + NH + pad]
      ]);
    }

    if (!_fitted) { _fitted = true; setTimeout(fit, 80); }

    applyHighlight(_highlightId);
  }

  function applyHighlight(nodeId) {
    _highlightId = nodeId;
    ng.selectAll('g.nd').each(function(d) {
      var fo = this.querySelector('foreignObject');
      var div = fo && fo.querySelector('div');
      if (!div) return;
      if (nodeId && d.data.id === nodeId) {
        div.style.outline = '3px solid #2563EB';
        div.style.outlineOffset = '3px';
        div.style.boxShadow = '0 0 0 8px rgba(37,99,235,0.25), 0 4px 24px rgba(37,99,235,0.22)';
        div.style.borderRadius = '8px';
      } else {
        div.style.outline = '';
        div.style.outlineOffset = '';
        div.style.boxShadow = '';
      }
    });
  }

  function toggle(d) {
    if (d.children) { d._children = d.children; d.children = null; }
    else if (d._children) { d.children = d._children; d._children = null; }
  }

  function fit() {
    var cw = ctr.clientWidth || 900;
    var ch = ctr.clientHeight || 600;
    try {
      var bb = zg.node().getBBox();
      if (!bb || bb.width === 0) return;
      var s = Math.min(0.9, Math.min(cw / (bb.width + 80), ch / (bb.height + 80)));
      var tx = cw / 2 - s * (bb.x + bb.width / 2);
      var ty = Math.max(20, ch / 4 - s * bb.y);
      svg.call(zoomBeh.transform, d3.zoomIdentity.translate(tx, ty).scale(s));
      _z = s;
    } catch(e) {}
  }

  // ── Info panel ──
  function openPanel(data) {
    var cat = data.nivel_cat || 'unknown';
    var c = C[cat] || C.unknown;
    var ini = (data.nome || '').split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join('') || '?';
    document.getElementById('info-avatar').textContent = ini;
    document.getElementById('info-avatar').style.background = c.bg;
    document.getElementById('info-avatar').style.color = c.tx;
    document.getElementById('info-nome').textContent = data.nome || '—';
    document.getElementById('info-cargo').textContent = data.cargo || '—';
    var rows = [];
    var nlbl = data.nivel_raw || NL[cat] || null;
    if (nlbl) rows.push(['Nível', '<span class="info-badge" style="background:' + c.bg + ';color:' + c.tx + '">' + nlbl + '</span>']);
    var mat = (data.id || '').split('|')[0];
    if (mat && mat !== 'nan') rows.push(['Matrícula', mat]);
    rows.push(['Admissão', data.admissao || '—']);
    if (data.email) rows.push(['E-mail', '<a href="mailto:' + data.email + '" style="color:var(--c-accent);text-decoration:none">' + data.email + '</a>']);
    if (data.gestor_nome) rows.push(['Gestor', data.gestor_nome]);
    if (data.centro_custo) rows.push(['Centro de Custo', data.centro_custo]);
    if (data.posicao) rows.push(['Posição', data.posicao]);
    if (data.isManager) {
      var spanVal = data.liderados_diretos + data.liderados_indiretos;
      rows.push(['Diretos', data.liderados_diretos]);
      rows.push(['Indiretos', data.liderados_indiretos]);
      rows.push(['Span', spanVal]);
    }
    document.getElementById('info-rows').innerHTML = rows.map(function(r){
      return '<div class="info-row"><span class="info-row-label">' + r[0] + '</span><span class="info-row-val">' + r[1] + '</span></div>';
    }).join('');
    document.getElementById('info-panel').classList.add('open');
  }
  document.getElementById('info-close').addEventListener('click', function(){
    document.getElementById('info-panel').classList.remove('open');
    _lastOpenId = null;
  });

  // ── Busca ──
  function clearSearch() {
    _searchResults = [];
    _searchIndex   = -1;
    applyHighlight(null);
    var counterEl = document.getElementById('search-counter');
    if (counterEl) counterEl.textContent = '';
    var bp = document.getElementById('btn-prev-result');
    var bn = document.getElementById('btn-next-result');
    if (bp) bp.disabled = true;
    if (bn) bn.disabled = true;
  }

  function updateSearchCounter() {
    var counterEl = document.getElementById('search-counter');
    if (!counterEl) return;
    if (_searchResults.length === 0) { counterEl.textContent = ''; return; }
    counterEl.textContent = (_searchIndex + 1) + '/' + _searchResults.length + ' encontrados';
    var bp = document.getElementById('btn-prev-result');
    var bn = document.getElementById('btn-next-result');
    if (bp) bp.disabled = _searchResults.length <= 1;
    if (bn) bn.disabled = _searchResults.length <= 1;
  }

  function showSearchResult(idx) {
    if (!_searchResults.length) return;
    _searchIndex = (idx + _searchResults.length) % _searchResults.length;
    var found = _searchResults[_searchIndex];
    _highlightId = found.data.id;
    // Recolhe tudo antes de expandir o caminho até o resultado
    root.each(function(d){
      if (d.depth > 0 && d.children) { d._children = d.children; d.children = null; }
    });
    found.ancestors().reverse().forEach(function(a){
      if (a._children) { a.children = a._children; a._children = null; }
    });
    update();
    openPanel(found.data);
    updateSearchCounter();
    setTimeout(function(){
      var tx = ctr.clientWidth  / 2 - _z * found.x;
      var ty = ctr.clientHeight / 2 - _z * found.y;
      svg.transition().duration(500).call(zoomBeh.transform, d3.zoomIdentity.translate(tx, ty).scale(_z));
    }, 120);
  }

  function doSearch() {
    var q = (document.getElementById('q').value || '').trim().toLowerCase();
    if (!q) { clearSearch(); return; }
    var results = [];
    (function searchAll(d) {
      if (
        (d.data.nome         || '').toLowerCase().indexOf(q) !== -1 ||
        (d.data.cargo        || '').toLowerCase().indexOf(q) !== -1 ||
        (d.data.centro_custo || '').toLowerCase().indexOf(q) !== -1 ||
        (d.data.gestor_nome  || '').toLowerCase().indexOf(q) !== -1 ||
        (d.data.email        || '').toLowerCase().indexOf(q) !== -1 ||
        (d.data.posicao      || '').toLowerCase().indexOf(q) !== -1
      ) results.push(d);
      (d.children  || []).forEach(searchAll);
      (d._children || []).forEach(searchAll);
    })(root);
    if (!results.length) {
      clearSearch();
      var counterEl = document.getElementById('search-counter');
      if (counterEl) counterEl.textContent = '0 encontrados';
      return;
    }
    _searchResults = results;
    showSearchResult(0);
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('q').addEventListener('keydown', function(e){ if (e.key === 'Enter') doSearch(); });
  document.getElementById('q').addEventListener('input', function(){ if (!this.value.trim()) clearSearch(); });
  document.getElementById('btn-prev-result').addEventListener('click', function(){ showSearchResult(_searchIndex - 1); });
  document.getElementById('btn-next-result').addEventListener('click', function(){ showSearchResult(_searchIndex + 1); });

  // ── Profundidade ──
  document.querySelectorAll('.dbtn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.dbtn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var v = parseInt(btn.getAttribute('data-depth'));
      root.each(function(d){ if (d._children) { d.children = d._children; d._children = null; } });
      root.descendants().forEach(function(d){
        if (d.depth >= v && d.children) { d._children = d.children; d.children = null; }
      });
      update();
    });
  });

  // ── Expandir / Recolher ──
  document.getElementById('btn-expand').addEventListener('click', function(){
    root.each(function(d){ if (d._children) { d.children = d._children; d._children = null; } });
    update();
  });
  document.getElementById('btn-collapse').addEventListener('click', function(){
    root.descendants().forEach(function(d){
      if (d.depth > 0 && d.children) { d._children = d.children; d.children = null; }
    });
    update();
  });

  // ── Zoom ──
  document.getElementById('btn-zoom-in').addEventListener('click', function(){
    svg.transition().duration(200).call(zoomBeh.scaleBy, 1.3);
  });
  document.getElementById('btn-zoom-out').addEventListener('click', function(){
    svg.transition().duration(200).call(zoomBeh.scaleBy, 1 / 1.3);
  });
  document.getElementById('btn-fit').addEventListener('click', fit);
  document.getElementById('btn-export-pdf').addEventListener('click', function(){
    fit();
    var svgEl = svg.node();
    setTimeout(function(){
      try {
        var bb = zg.node().getBBox();
        if (bb && bb.width > 0) {
          var p = 80;
          svgEl.setAttribute('viewBox', (bb.x-p)+' '+(bb.y-p)+' '+(bb.width+2*p)+' '+(bb.height+2*p));
          svgEl.setAttribute('width', '100%');
          svgEl.removeAttribute('height');
        }
      } catch(e){}
      window.print();
      setTimeout(function(){
        svgEl.removeAttribute('viewBox');
        svgEl.setAttribute('width','100%');
        svgEl.setAttribute('height','100%');
      }, 1500);
    }, 450);
  });

  // ── Filtros dinâmicos ──
  document.getElementById('view-select').addEventListener('change', function(){
    document.getElementById('mgr-input').value = '';
    var val = this.value;
    setView((val && val !== '__mgr__') ? val : null);
  });

  document.getElementById('mgr-input').addEventListener('change', function(){
    var nome = this.value.trim();
    this.value = '';
    if (!nome) { setView(null); return; }
    var node = ALL_RAW.find(function(d){ return d.nome === nome && d.isManager; });
    if (node) document.getElementById('view-select').value = '__mgr__';
    setView(node ? node.id : null);
  });

  // ── Inicialização ──
  buildDropdowns();
  setView(null);

})();
</script>
</body></html>
